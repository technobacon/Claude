name: Friend Forecast CI

on:
  pull_request:
    paths:
      - "friend-forecast/**"
      - ".github/workflows/friend-forecast-ci.yml"
  push:
    branches:
      - main
    paths:
      - "friend-forecast/**"
      - ".github/workflows/friend-forecast-ci.yml"

permissions:
  contents: read

concurrency:
  group: friend-forecast-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: friend-forecast
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npm run check:migrations
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  mobile-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: friend-forecast
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
