<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#0f1115" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Forkful" />
    <title>Forkful — swipe to find what to cook</title>
    <style>
      :root {
        --bg: #0f1115;
        --card: #1b1f27;
        --text: #f3f5f7;
        --muted: #9aa4b2;
        --right: #2ecc71;
        --left: #ff5a5f;
        --accent: #ffb703;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; background: var(--bg); color: var(--text);
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        overscroll-behavior: none; -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      .app {
        max-width: 460px; margin: 0 auto;
        padding: calc(14px + env(safe-area-inset-top)) 14px calc(24px + env(safe-area-inset-bottom));
        min-height: 100dvh; display: flex; flex-direction: column;
      }
      .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
      .brand { font-weight: 800; font-size: 22px; letter-spacing: -0.02em; }
      .brand span { color: var(--accent); }
      .tabs { display: flex; gap: 8px; }
      .tab { background: transparent; border: 1px solid #2a303b; color: var(--muted);
        padding: 6px 12px; border-radius: 999px; cursor: pointer; font-size: 13px; }
      .tab.active { color: var(--text); border-color: var(--accent); }
      .filters { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
      .frow { display: flex; gap: 8px; flex-wrap: wrap; }
      .fbtn { flex: 1 1 30%; min-width: 0; background: #161a21; color: var(--muted);
        border: 1px solid #2a303b; border-radius: 10px; padding: 10px 8px; font-size: 13px;
        cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .fbtn.on { color: #11151c; background: var(--accent); border-color: var(--accent); font-weight: 600; }
      .opt-list { display: flex; flex-direction: column; }
      .opt-row { display: flex; justify-content: space-between; align-items: center; padding: 13px 4px;
        border-bottom: 1px solid #232936; cursor: pointer; font-size: 15px; }
      .opt-row.checked { color: var(--accent); }
      .opt-check { color: var(--accent); font-weight: 700; font-size: 16px; }
      .tab.gear { padding: 6px 10px; }
      .tab.gear.on { color: #11151c; background: var(--accent); border-color: var(--accent); }
      .pill.time { color: var(--accent); }
      .key-input { width: 100%; box-sizing: border-box; background: #11151c; color: var(--text);
        border: 1px solid #2a303b; border-radius: 10px; padding: 12px; font-size: 15px; margin: 6px 0 12px; }
      .settings-note { font-size: 12px; color: var(--muted); margin: 4px 0; line-height: 1.4; }
      .settings-link { display: inline-block; margin-top: 12px; color: var(--accent); text-decoration: none; font-size: 14px; }
      .pill.easy { color: var(--right); }
      .pill.hard { color: var(--left); }
      .pill.medium { color: var(--accent); }
      .deck { position: relative; flex: 1; min-height: 420px; max-width: 340px; width: 100%; margin: 0 auto; }
      .card { position: absolute; inset: 0; background: var(--card); border-radius: 20px;
        overflow: hidden; box-shadow: 0 12px 40px rgba(0,0,0,0.4); display: flex;
        flex-direction: column; user-select: none; -webkit-user-select: none; touch-action: pan-y; }
      .card .photo { width: 100%; height: 50%; object-fit: cover; background: #11151c; pointer-events: none; }
      .card .body { padding: 16px 18px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
      .card h2 { margin: 0; font-size: 22px; line-height: 1.2; }
      .meta { display: flex; gap: 8px; flex-wrap: wrap; font-size: 12px; color: var(--muted); }
      .meta .pill { background: #232936; border-radius: 6px; padding: 2px 7px; }
      .factline { font-size: 12px; color: var(--muted); }
      .ingredients { font-size: 14px; color: var(--muted); margin: 0; overflow: hidden; line-height: 1.45;
        display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; }
      .source { margin-top: auto; font-size: 11px; color: var(--muted); }
      .stamp { position: absolute; top: 22px; font-size: 28px; font-weight: 900; padding: 4px 12px;
        border-radius: 10px; border: 4px solid; opacity: 0; pointer-events: none; }
      .stamp.like { right: 18px; color: var(--right); border-color: var(--right); transform: rotate(12deg); }
      .stamp.nope { left: 18px; color: var(--left); border-color: var(--left); transform: rotate(-12deg); }
      .controls { display: flex; justify-content: center; align-items: center; gap: 22px; margin-top: 16px; }
      .controls button { width: 62px; height: 62px; border-radius: 50%; border: none; font-size: 26px;
        cursor: pointer; color: #fff; transition: transform 0.1s ease; }
      .controls button:active { transform: scale(0.9); }
      .btn-nope { background: var(--left); }
      .btn-like { background: var(--right); }
      .btn-undo { width: 48px; height: 48px; font-size: 20px; background: #2a303b; color: var(--muted); }
      .btn-undo:disabled { opacity: 0.35; }
      .empty, .loading { text-align: center; color: var(--muted); margin-top: 80px; }
      .list-item { display: flex; gap: 12px; align-items: center; background: var(--card);
        border-radius: 12px; padding: 10px; margin-bottom: 10px; }
      .list-item img { width: 64px; height: 64px; border-radius: 8px; object-fit: cover; }
      .list-item .info { flex: 1; min-width: 0; cursor: pointer; }
      .list-item .info .title-link { color: var(--text); font-weight: 600; }
      .list-item .info small { color: var(--muted); }
      .cook { color: var(--accent); }
      .remove { background: transparent; border: none; color: var(--muted); font-size: 18px; cursor: pointer; }
      .source-note { text-align: center; margin-top: 10px; font-size: 11px; color: var(--muted); }
      /* detail sheet */
      .sheet-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100;
        display: flex; align-items: flex-end; justify-content: center; }
      .sheet { width: 100%; max-width: 460px; max-height: 92dvh; overflow-y: auto; background: var(--card);
        border-radius: 20px 20px 0 0; padding-bottom: calc(16px + env(safe-area-inset-bottom));
        -webkit-overflow-scrolling: touch; animation: slideup 0.24s cubic-bezier(0.18,0.89,0.32,1.1); }
      .sheet-head { position: sticky; top: 0; z-index: 3; display: flex; align-items: center; gap: 10px;
        padding: 10px 12px; background: var(--card); }
      .sheet-close { width: 40px; height: 40px; border-radius: 50%; border: none; background: #2a303b;
        color: var(--text); font-size: 22px; line-height: 1; cursor: pointer; flex: 0 0 auto; }
      .sheet-close:active { background: #353d4b; }
      .sheet-head .htitle { font-size: 14px; font-weight: 600; color: var(--muted); overflow: hidden;
        white-space: nowrap; text-overflow: ellipsis; }
      .sheet-photo { width: 100%; height: 220px; object-fit: cover; }
      .sheet-body { padding: 14px 18px; }
      .sheet-body h2 { margin: 6px 0; }
      .sheet-body h3 { margin: 16px 0 6px; font-size: 14px; color: var(--accent); }
      .ing-list { margin: 0; padding-left: 18px; font-size: 14px; }
      .ing-list li { margin: 3px 0; }
      .cook-cta { display: block; text-align: center; margin-top: 16px; padding: 14px; border-radius: 12px;
        background: var(--accent); color: #11151c; font-weight: 700; text-decoration: none; }
      .sheet-actions { display: flex; gap: 12px; margin-top: 14px; }
      .sheet-actions button { flex: 1; border: none; border-radius: 12px; padding: 14px; font-size: 15px;
        font-weight: 700; color: #fff; cursor: pointer; }
      @keyframes slideup { from { transform: translateY(100%); } }
      .sk { background: linear-gradient(90deg,#1b1f27 25%,#232936 50%,#1b1f27 75%);
        background-size: 200% 100%; animation: shimmer 1.2s infinite; }
      @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
  </head>
  <body>
    <main class="app" id="app"></main>

    <script>
      "use strict";
      // ----- Forkful standalone (client-only) -------------------------------
      // Talks to TheMealDB directly; saves likes in localStorage. No server.
      const BASE = "https://www.themealdb.com/api/json/v1/1";
      const SWIPE_THRESHOLD = 110;

      // Dropdown options. Category = a single TheMealDB category dimension
      // (diet + protein live together because a meal has exactly one category).
      const CATEGORIES = [
        "Vegetarian", "Vegan", "Chicken", "Beef", "Seafood", "Pork", "Lamb", "Pasta",
      ].map(c => [c, c]);
      const CUISINES = [
        "American", "British", "Canadian", "Chinese", "Croatian", "Dutch", "Egyptian",
        "Filipino", "French", "Greek", "Indian", "Irish", "Italian", "Jamaican",
        "Japanese", "Malaysian", "Mexican", "Moroccan", "Polish", "Portuguese",
        "Russian", "Spanish", "Thai", "Tunisian", "Turkish", "Ukrainian", "Vietnamese",
      ].map(c => [c, c]);
      const DIFFICULTIES = [["Easy", "easy"], ["Medium", "medium"], ["Hard", "hard"]];

      // Spoonacular filter options (used only when a key is set). Values must
      // match Spoonacular's accepted parameter values.
      const cap = s => s.replace(/\b\w/g, m => m.toUpperCase());
      const TIMES = [["≤ 20 min", "20"], ["≤ 30 min", "30"], ["≤ 45 min", "45"], ["≤ 60 min", "60"]];
      const SPOON_TYPES = ["main course", "side dish", "breakfast", "salad", "soup", "appetizer", "snack", "dessert", "drink", "bread"].map(c => [cap(c), c]);
      const SPOON_CUISINES = ["African", "American", "British", "Caribbean", "Chinese", "Eastern European", "French", "German", "Greek", "Indian", "Italian", "Japanese", "Korean", "Latin American", "Mediterranean", "Mexican", "Middle Eastern", "Nordic", "Spanish", "Thai", "Vietnamese"].map(c => [c, c]);
      const SPOON_DIETS = ["Vegetarian", "Vegan", "Gluten Free", "Ketogenic", "Paleo", "Pescetarian", "Dairy Free", "Whole30"].map(c => [c, c.toLowerCase()]);

      // ----- persistent state ----------------------------------------------
      const SW_KEY = "forkful_swipes";
      const SAVED_KEY = "forkful_saved";
      const readJSON = (k, d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } };
      const writeJSON = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

      const KEY_KEY = "forkful_spoon_key";
      const state = {
        tab: "discover",
        spoonKey: (localStorage.getItem(KEY_KEY) || "").trim(), // stored on-device only
        spoonError: "",
        settingsOpen: false,
        openFilter: null,                   // which filter's checklist is open
        // each filter holds an array of selected values (multi-select)
        filters: { category: [], cuisine: [], diet: [], mealType: [], maxTime: [], difficulty: [] },
        deck: [],
        loading: true,
        history: [],
        swipes: readJSON(SW_KEY, {}),       // id -> "right" | "left"
        saved: readJSON(SAVED_KEY, []),     // array of recipe objects
        detail: null,
      };

      function haptic(ms) { try { navigator.vibrate && navigator.vibrate(ms || 8); } catch {} }

      // ----- data layer -----------------------------------------------------
      async function getJSON(path) {
        try {
          const res = await fetch(BASE + "/" + path);
          if (!res.ok) return [];
          const data = await res.json();
          return data.meals || [];
        } catch { return []; }
      }

      // Spoonacular calls go straight from the browser; the key (query param)
      // lives only in this device's localStorage, never in the repo.
      async function spoonGet(path) {
        try {
          const sep = path.includes("?") ? "&" : "?";
          const res = await fetch("https://api.spoonacular.com/" + path + sep + "apiKey=" + encodeURIComponent(state.spoonKey));
          if (res.status === 401) { state.spoonError = "Spoonacular key looks invalid — check it in ⚙ Settings."; return null; }
          if (res.status === 402) { state.spoonError = "Spoonacular daily free limit reached. Try again tomorrow, or clear the key to use free recipes."; return null; }
          if (!res.ok) { state.spoonError = "Spoonacular error (" + res.status + ")."; return null; }
          state.spoonError = "";
          return await res.json();
        } catch { state.spoonError = "Couldn't reach Spoonacular (network)."; return null; }
      }

      const stripHtml = s => (s || "").replace(/<[^>]*>/g, " ").replace(/\s+/g, " ").trim();

      function parseMeasure(m) {
        const t = (m || "").trim();
        const match = t.match(/^([\d.]+(?:\s*\/\s*\d+)?)\s*(.*)$/);
        if (!match) return { unit: t || undefined };
        let q;
        if (match[1].includes("/")) { const p = match[1].split("/").map(parseFloat); q = p[1] ? p[0]/p[1] : undefined; }
        else q = parseFloat(match[1]);
        return { quantity: isFinite(q) ? q : undefined, unit: (match[2] || "").trim() || undefined };
      }

      // Technique words that signal real cooking complexity. Difficulty is
      // driven mostly by *technique*, not by how many ingredients are listed
      // (a 12-ingredient toss salad is easy; a 6-ingredient braise is not).
      const HARD_TECH = [
        "braise", "sear", "caramel", "deglaze", "reduce by", "reduce until", "fold in",
        "knead", "proof", "prove ", "temper", "emulsif", "blanch", "poach", "confit",
        "sous vide", "ferment", "marinat", "flambe", "julienne", "debone", "fillet",
        "baste", "sauté", "saute", "sweat", "purée", "puree", "strain", "sieve",
        "whisk until", "beat until", "simmer for", "render", "truss", "glaze", "caramelis",
      ];
      function computeDifficulty(ingredientCount, instructions, minutes, stepsOverride) {
        const text = (instructions || "").toLowerCase();
        // Real step count: prefer an explicit count (Spoonacular) or line breaks
        // (TheMealDB); fall back to sentences only for a single text block.
        let steps = stepsOverride || 0;
        if (!steps) {
          const lines = (instructions || "").split(/\r?\n/).map(s => s.trim()).filter(Boolean);
          steps = lines.length;
          if (steps <= 1) steps = Math.max(1, text.split(/[.!?]\s+/).filter(s => s.trim()).length);
        }
        let hard = 0;
        for (const t of HARD_TECH) if (text.includes(t)) hard++;
        let level = "medium", score;
        if (minutes) {
          // Time-first when we actually know it (Spoonacular's readyInMinutes).
          score = minutes / 12 + steps * 0.4 + hard * 1.5;
          if (score <= 4) level = "easy";
          else if (score >= 8.5) level = "hard";
        } else {
          // Technique-first heuristic for sources without a time field.
          const longTime = /overnight|\bhours?\b|\b[2-9]\d\s*min/.test(text) ? 1 : 0;
          const easyLean = hard === 0 &&
            /\b(toss|assemble|no.?cook|combine|spread|layer|stir together|drizzle)\b/.test(text) ? 1 : 0;
          score = ingredientCount * 0.3 + steps * 0.6 + hard * 2.2 + longTime * 1.5 - easyLean * 2;
          if (score <= 4.5) level = "easy";
          else if (score >= 10) level = "hard";
        }
        return { level, steps, score };
      }

      function normalize(meal) {
        const ingredients = [];
        for (let i = 1; i <= 20; i++) {
          const name = meal["strIngredient" + i];
          if (!name || !name.trim()) continue;
          const measure = (meal["strMeasure" + i] || "").trim();
          const pm = measure ? parseMeasure(measure) : {};
          ingredients.push({
            raw: (measure + " " + name.trim()).trim(),
            name: name.trim().toLowerCase(),
            quantity: pm.quantity, unit: pm.unit,
          });
        }
        const src = (meal.strSource || "").trim();
        const sourceUrl = src || ("https://www.themealdb.com/meal/" + meal.idMeal);
        let publisher = "TheMealDB";
        if (src) { try { publisher = new URL(src).hostname.replace(/^www\./, ""); } catch {} }
        const tags = { cuisine: [], mealType: [], diet: [], main: [] };
        if (meal.strArea) tags.cuisine.push(meal.strArea.toLowerCase());
        if (meal.strCategory) {
          const c = meal.strCategory.toLowerCase();
          if (["breakfast","dessert","side","starter"].includes(c)) tags.mealType.push(c);
          if (["vegetarian","vegan"].includes(c)) tags.diet.push(c);
          if (["beef","chicken","pork","lamb","seafood"].includes(c)) tags.main.push(c);
        }
        const instr = (meal.strInstructions || "").trim();
        const dif = computeDifficulty(ingredients.length, instr);
        return {
          id: "themealdb:" + meal.idMeal,
          title: meal.strMeal,
          image: meal.strMealThumb || null,
          ingredients, tags, sourceUrl, publisher,
          stepCount: dif.steps, difficulty: dif.level,
        };
      }

      function normalizeSpoon(r) {
        if (!r || !r.title) return null;
        const seen = new Set(); const ings = [];
        (r.extendedIngredients || []).forEach(i => {
          const raw = (i.original || i.name || "").trim();
          if (raw && !seen.has(raw.toLowerCase())) { seen.add(raw.toLowerCase()); ings.push({ raw, name: (i.nameClean || i.name || "").toLowerCase() }); }
        });
        const sourceUrl = r.sourceUrl || r.spoonacularSourceUrl ||
          ("https://spoonacular.com/recipes/" + (r.title || "recipe").replace(/[^a-z0-9]+/gi, "-") + "-" + r.id);
        let publisher = r.sourceName || "Spoonacular";
        if (!r.sourceName && r.sourceUrl) { try { publisher = new URL(r.sourceUrl).hostname.replace(/^www\./, ""); } catch {} }
        const tags = {
          cuisine: (r.cuisines || []).map(c => c.toLowerCase()),
          mealType: (r.dishTypes || []).map(c => c.toLowerCase()),
          diet: (r.diets || []).map(c => c.toLowerCase()),
          main: [],
        };
        const stepObjs = (r.analyzedInstructions && r.analyzedInstructions[0] && r.analyzedInstructions[0].steps) || [];
        const instrText = stripHtml(r.instructions) || stepObjs.map(s => s.step).join(". ");
        const dif = computeDifficulty(ings.length, instrText, r.readyInMinutes || null, stepObjs.length);
        return {
          id: "spoonacular:" + r.id,
          title: r.title,
          image: r.image || null,
          ingredients: ings,
          tags, sourceUrl, publisher,
          minutes: r.readyInMinutes || null,
          stepCount: dif.steps, difficulty: dif.level,
        };
      }

      function fingerprint(r) {
        const title = r.title.toLowerCase().replace(/[^a-z0-9]+/g, " ").trim();
        let domain = ""; try { domain = new URL(r.sourceUrl).hostname.replace(/^www\./, ""); } catch {}
        return title + "|" + domain;
      }
      function dedupe(list) {
        const seen = new Set(); const out = [];
        for (const r of list) { const f = fingerprint(r); if (!seen.has(f)) { seen.add(f); out.push(r); } }
        return out;
      }
      function shuffle(a) {
        a = a.slice();
        for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
        return a;
      }

      // Reorder so no cuisine repeats within `gap` cards (when possible).
      function spaceByCuisine(list, gap) {
        const remaining = list.slice();
        const out = [];
        const recent = [];
        const key = r => r.tags.cuisine[0] || "unknown";
        while (remaining.length) {
          let idx = remaining.findIndex(r => !recent.includes(key(r)));
          if (idx === -1) idx = 0; // pool exhausted of fresh cuisines -> relax
          const picked = remaining.splice(idx, 1)[0];
          out.push(picked);
          recent.push(key(picked));
          if (recent.length > gap) recent.shift();
        }
        return out;
      }

      // Hydrate a list of stubs (id/name/thumb) into full meal objects.
      async function hydrate(stubs, max) {
        const ids = shuffle(stubs).slice(0, max).map(m => m.idMeal);
        const full = await Promise.all(ids.map(id => getJSON("lookup.php?i=" + id)));
        return full.flat();
      }

      async function fetchMealDB() {
        const cats = state.filters.category;     // arrays (multi-select)
        const cuisines = state.filters.cuisine;
        let meals = [];
        if (cats.length) {
          const stubs = (await Promise.all(cats.map(c => getJSON("filter.php?c=" + encodeURIComponent(c))))).flat();
          meals = await hydrate(stubs, 30);
          if (cuisines.length) {
            const set = new Set(cuisines.map(c => c.toLowerCase()));
            meals = meals.filter(m => set.has((m.strArea || "").toLowerCase()));
          }
        } else if (cuisines.length) {
          const stubs = (await Promise.all(cuisines.map(a => getJSON("filter.php?a=" + encodeURIComponent(a))))).flat();
          meals = await hydrate(stubs, 30);
        } else {
          // No filters: pull genuinely random recipes from the whole database.
          const calls = await Promise.all(Array.from({ length: 22 }, () => getJSON("random.php")));
          meals = calls.flat();
        }
        return meals.map(normalize);
      }

      async function fetchSpoon() {
        const f = state.filters;
        const base = new URLSearchParams();
        base.set("number", "12");
        base.set("addRecipeInformation", "true");
        base.set("fillIngredients", "true");
        base.set("instructionsRequired", "true");
        if (f.cuisine.length) base.set("cuisine", f.cuisine.join(",")); // OR
        if (f.diet.length) base.set("diet", f.diet.join(","));          // AND (Spoonacular)
        if (f.maxTime.length) base.set("maxReadyTime", f.maxTime[0]);
        const narrow = f.cuisine.length || f.diet.length || f.maxTime.length || f.mealType.length;
        // Spoonacular 'type' is single-valued — one call per selected meal type.
        const types = f.mealType.length ? f.mealType : [null];
        const calls = types.map(t => {
          const q = new URLSearchParams(base);
          if (t) q.set("type", t);
          q.set("offset", String(Math.floor(Math.random() * (narrow ? 20 : 100))));
          return spoonGet("recipes/complexSearch?" + q.toString());
        });
        let results = (await Promise.all(calls)).flatMap(d => (d && d.results) || []);
        if (!results.length && !state.spoonError) {
          base.set("offset", "0");
          if (types[0]) base.set("type", types[0]);
          const d = await spoonGet("recipes/complexSearch?" + base.toString());
          results = (d && d.results) || [];
        }
        return results.map(normalizeSpoon).filter(Boolean);
      }

      async function fetchDeck() {
        let recipes = state.spoonKey ? await fetchSpoon() : await fetchMealDB();
        recipes = dedupe(recipes);
        recipes = recipes.filter(r => !state.swipes[r.id]); // exclude already swiped
        if (state.filters.difficulty.length) recipes = recipes.filter(r => state.filters.difficulty.includes(r.difficulty));
        recipes = shuffle(recipes);
        recipes = spaceByCuisine(recipes, 3); // no country repeats within 3 cards
        return recipes;
      }

      // ----- actions --------------------------------------------------------
      function recordSwipe(recipe, dir) {
        state.swipes[recipe.id] = dir; writeJSON(SW_KEY, state.swipes);
        if (dir === "right" && !state.saved.some(r => r.id === recipe.id)) {
          state.saved.unshift(recipe); writeJSON(SAVED_KEY, state.saved);
        }
        state.history.push({ recipe, dir });
        state.deck = state.deck.filter(r => r.id !== recipe.id);
        haptic(dir === "right" ? 14 : 8);
        render();
      }
      function undo() {
        const last = state.history.pop();
        if (!last) return;
        delete state.swipes[last.recipe.id]; writeJSON(SW_KEY, state.swipes);
        if (last.dir === "right") { state.saved = state.saved.filter(r => r.id !== last.recipe.id); writeJSON(SAVED_KEY, state.saved); }
        state.deck = [last.recipe, ...state.deck.filter(r => r.id !== last.recipe.id)];
        haptic(10); render();
      }
      function removeSaved(id) {
        state.saved = state.saved.filter(r => r.id !== id); writeJSON(SAVED_KEY, state.saved); render();
      }
      async function reload() {
        state.loading = true; render();
        state.deck = await fetchDeck();
        state.loading = false; state.history = []; render();
      }

      // ----- rendering ------------------------------------------------------
      const app = document.getElementById("app");
      const el = (tag, cls, txt) => { const e = document.createElement(tag); if (cls) e.className = cls; if (txt != null) e.textContent = txt; return e; };

      function render() {
        app.innerHTML = "";
        // top bar
        const top = el("header", "topbar");
        const brand = el("div", "brand"); brand.innerHTML = 'Fork<span>ful</span>';
        const tabs = el("nav", "tabs");
        const tD = el("button", "tab" + (state.tab === "discover" ? " active" : ""), "Discover");
        tD.onclick = () => { state.tab = "discover"; render(); };
        const tS = el("button", "tab" + (state.tab === "saved" ? " active" : ""), "Saved" + (state.saved.length ? " (" + state.saved.length + ")" : ""));
        tS.onclick = () => { state.tab = "saved"; render(); };
        const gear = el("button", "tab gear" + (state.spoonKey ? " on" : ""), "⚙");
        gear.setAttribute("aria-label", "Settings");
        gear.onclick = () => { state.settingsOpen = true; render(); };
        tabs.append(tD, tS, gear); top.append(brand, tabs); app.append(top);

        if (state.tab === "discover") renderDiscover();
        else renderSaved();

        if (state.settingsOpen) renderSettings();
        else if (state.openFilter) renderFilterPopover();
        else if (state.detail) renderSheet(state.detail);
      }

      function renderSettings() {
        const back = el("div", "sheet-backdrop");
        back.onclick = () => { state.settingsOpen = false; render(); };
        const sheet = el("div", "sheet");
        sheet.onclick = e => e.stopPropagation();
        const head = el("div", "sheet-head");
        const close = el("button", "sheet-close", "←");
        close.onclick = () => { state.settingsOpen = false; render(); };
        head.append(close, el("span", "htitle", "Settings"));
        sheet.append(head);
        const body = el("div", "sheet-body");
        body.append(el("h3", null, "Spoonacular API key"));
        body.append(el("p", "settings-note", "Unlocks ~5,000+ recipes with cook times, diets, allergens and nutrition. Your key is stored only on this device and is never uploaded or committed anywhere."));
        const input = el("input", "key-input");
        input.type = "text"; input.value = state.spoonKey;
        input.placeholder = "Paste your key here";
        input.autocapitalize = "off"; input.autocorrect = "off"; input.spellcheck = false;
        body.append(input);
        const row = el("div", "sheet-actions");
        const save = el("button", "btn-like", "Save key");
        const emptyFilters = () => ({ category: [], cuisine: [], diet: [], mealType: [], maxTime: [], difficulty: [] });
        save.onclick = () => {
          state.spoonKey = input.value.trim();
          if (state.spoonKey) localStorage.setItem(KEY_KEY, state.spoonKey); else localStorage.removeItem(KEY_KEY);
          state.filters = emptyFilters(); // option sets differ between sources
          state.spoonError = ""; state.settingsOpen = false; reload();
        };
        const clear = el("button", "btn-nope", state.spoonKey ? "Remove" : "Cancel");
        clear.onclick = () => {
          if (state.spoonKey) { state.spoonKey = ""; localStorage.removeItem(KEY_KEY); state.filters = emptyFilters(); state.settingsOpen = false; reload(); }
          else { state.settingsOpen = false; render(); }
        };
        row.append(clear, save); body.append(row);
        const link = el("a", "settings-link", "Get a free key → spoonacular.com/food-api");
        link.href = "https://spoonacular.com/food-api/console#Dashboard"; link.target = "_blank"; link.rel = "noopener";
        body.append(link);
        body.append(el("p", "settings-note", state.spoonKey
          ? "Status: using Spoonacular. Free plan ≈ 150 requests/day — each deck reload uses a few."
          : "Status: using free recipes (TheMealDB). Add a key for cook-time & diet filters."));
        sheet.append(body); back.append(sheet); app.append(back);
      }

      // Filter definitions per source. `single: true` = pick at most one.
      function filterConfig() {
        if (state.spoonKey) return [
          { key: "mealType", label: "Meal", options: SPOON_TYPES },
          { key: "cuisine", label: "Cuisine", options: SPOON_CUISINES },
          { key: "diet", label: "Diet", options: SPOON_DIETS },
          { key: "maxTime", label: "Max time", options: TIMES, single: true },
          { key: "difficulty", label: "Difficulty", options: DIFFICULTIES },
        ];
        return [
          { key: "category", label: "Type", options: CATEGORIES },
          { key: "cuisine", label: "Cuisine", options: CUISINES },
          { key: "difficulty", label: "Difficulty", options: DIFFICULTIES },
        ];
      }

      function filterButton(cfg) {
        const sel = state.filters[cfg.key];
        let text = cfg.label;
        if (cfg.single && sel.length) {
          const opt = cfg.options.find(o => o[1] === sel[0]);
          text = opt ? opt[0] : cfg.label;
        } else if (sel.length) {
          text = cfg.label + " (" + sel.length + ")";
        }
        const b = el("button", "fbtn" + (sel.length ? " on" : ""), text + " ▾");
        b.onclick = () => { state.openFilter = cfg.key; render(); };
        return b;
      }

      function renderFilterPopover() {
        const cfg = filterConfig().find(c => c.key === state.openFilter);
        if (!cfg) { state.openFilter = null; return; }
        const back = el("div", "sheet-backdrop");
        back.onclick = () => { state.openFilter = null; reload(); };
        const sheet = el("div", "sheet");
        sheet.onclick = e => e.stopPropagation();
        const head = el("div", "sheet-head");
        const close = el("button", "sheet-close", "←");
        close.onclick = () => { state.openFilter = null; reload(); };
        head.append(close, el("span", "htitle", cfg.label + (cfg.single ? "" : " — tick any")));
        sheet.append(head);
        const body = el("div", "sheet-body");
        const list = el("div", "opt-list");
        const sel = state.filters[cfg.key];
        cfg.options.forEach(([label, value]) => {
          const checked = sel.includes(value);
          const r = el("div", "opt-row" + (checked ? " checked" : ""));
          r.append(el("span", "opt-label", label));
          r.append(el("span", "opt-check", checked ? "✓" : ""));
          r.onclick = () => {
            if (cfg.single) state.filters[cfg.key] = checked ? [] : [value];
            else state.filters[cfg.key] = checked ? sel.filter(v => v !== value) : [...sel, value];
            render(); // refresh ticks (reload happens on close)
          };
          list.append(r);
        });
        body.append(list);
        const actions = el("div", "sheet-actions");
        const clear = el("button", "btn-nope", "Clear"); clear.onclick = () => { state.filters[cfg.key] = []; render(); };
        const done = el("button", "btn-like", "Done"); done.onclick = () => { state.openFilter = null; reload(); };
        actions.append(clear, done); body.append(actions);
        sheet.append(body); back.append(sheet); app.append(back);
      }

      function renderDiscover() {
        const filters = el("div", "filters");
        const row = el("div", "frow");
        filterConfig().forEach(cfg => row.append(filterButton(cfg)));
        filters.append(row);
        app.append(filters);

        if (state.loading) { app.append(skeleton()); return; }
        if (!state.deck.length) {
          const e = el("div", "empty");
          e.append(el("p", null, state.spoonError ? "⚠️ " + state.spoonError : "🍽️ No more cards. Try different filters."));
          const b = el("button", "tab active", "Reload deck"); b.onclick = reload; e.append(b);
          app.append(e); return;
        }
        app.append(buildDeck());

        const controls = el("div", "controls");
        const nope = el("button", "btn-nope", "✕"); nope.onclick = () => state.deck[0] && commitTop("left");
        const undoBtn = el("button", "btn-undo", "↩"); undoBtn.disabled = state.history.length === 0; undoBtn.onclick = undo;
        const like = el("button", "btn-like", "♥"); like.onclick = () => state.deck[0] && commitTop("right");
        controls.append(nope, undoBtn, like); app.append(controls);

        app.append(el("p", "source-note", (state.spoonKey ? "Recipes via Spoonacular" : "Recipes courtesy of TheMealDB") + " · saved on this device"));
      }

      let topCardEl = null;
      function buildDeck() {
        const deck = el("div", "deck");
        const visible = state.deck.slice(0, 3);
        // render back-to-front so the first is on top
        visible.slice().reverse().forEach((recipe) => {
          const i = visible.indexOf(recipe);
          deck.append(card(recipe, i));
        });
        return deck;
      }

      function card(recipe, depth) {
        const c = el("article", "card");
        c.style.transform = `translateY(${depth*10}px) scale(${1 - depth*0.04})`;
        c.style.zIndex = String(10 - depth);
        const like = el("div", "stamp like", "SAVE");
        const nope = el("div", "stamp nope", "SKIP");
        c.append(like, nope);
        if (recipe.image) { const img = el("img", "photo"); img.src = recipe.image; img.alt = recipe.title; img.draggable = false; c.append(img); }
        else c.append(el("div", "photo"));
        const body = el("div", "body");
        body.append(el("h2", null, recipe.title));
        const meta = el("div", "meta");
        [recipe.tags.cuisine[0], recipe.tags.mealType[0], recipe.tags.diet[0], recipe.tags.main[0]]
          .filter(Boolean).slice(0,3).forEach(t => meta.append(el("span", "pill", t)));
        meta.append(el("span", "pill " + recipe.difficulty, recipe.difficulty));
        if (recipe.minutes) meta.append(el("span", "pill time", "⏱ " + recipe.minutes + " min"));
        body.append(meta);
        body.append(el("div", "factline", (recipe.minutes ? recipe.minutes + " min · " : "") + recipe.ingredients.length + " ingredients · " + recipe.stepCount + " steps"));
        body.append(el("p", "ingredients", recipe.ingredients.map(x => x.name || x.raw).slice(0,12).join(", ")));
        body.append(el("div", "source", "via " + recipe.publisher + " · tap for details"));
        c.append(body);

        if (depth === 0) { topCardEl = c; attachDrag(c, recipe, like, nope); }
        return c;
      }

      function attachDrag(c, recipe, likeStamp, nopeStamp) {
        let startX = 0, startY = 0, startT = 0, active = false, moved = false, dx = 0;
        const setT = (off, anim) => {
          c.style.transition = anim ? "transform 0.28s cubic-bezier(0.18,0.89,0.32,1.1)" : "none";
          c.style.transform = `translateX(${off}px) rotate(${off/18}deg)`;
          likeStamp.style.opacity = Math.max(0, Math.min(1, off / SWIPE_THRESHOLD));
          nopeStamp.style.opacity = Math.max(0, Math.min(1, -off / SWIPE_THRESHOLD));
        };
        c.addEventListener("pointerdown", (e) => { active = true; moved = false; startX = e.clientX; startY = e.clientY; startT = Date.now(); c.setPointerCapture && c.setPointerCapture(e.pointerId); });
        c.addEventListener("pointermove", (e) => { if (!active) return; dx = e.clientX - startX; if (Math.abs(dx) > 6) moved = true; setT(dx, false); });
        const end = (e) => {
          if (!active) return; active = false;
          const dt = Date.now() - startT, dist = Math.abs(dx);
          const flick = dt < 250 && dist > 50;
          if (dx > 0 && (dist > SWIPE_THRESHOLD || flick)) flyOff(c, "right", recipe);
          else if (dx < 0 && (dist > SWIPE_THRESHOLD || flick)) flyOff(c, "left", recipe);
          else {
            const dy = e ? Math.abs(e.clientY - startY) : 0;
            if (!moved && dist < 6 && dy < 6) { state.detail = recipe; render(); }
            else setT(0, true);
          }
          dx = 0;
        };
        c.addEventListener("pointerup", end);
        c.addEventListener("pointercancel", end);
      }

      function flyOff(c, dir, recipe) {
        c.style.transition = "transform 0.2s ease-out";
        c.style.transform = `translateX(${dir === "right" ? 1000 : -1000}px) rotate(${dir === "right" ? 40 : -40}deg)`;
        setTimeout(() => recordSwipe(recipe, dir), 190);
      }
      function commitTop(dir) {
        if (topCardEl) flyOff(topCardEl, dir, state.deck[0]);
        else if (state.deck[0]) recordSwipe(state.deck[0], dir);
      }

      function skeleton() {
        const deck = el("div", "deck");
        const c = el("article", "card");
        c.append(el("div", "photo sk"));
        const body = el("div", "body");
        ["70%","40%","90%","80%"].forEach(w => { const l = el("div", "sk"); l.style.height = "14px"; l.style.borderRadius = "6px"; l.style.marginTop = "6px"; l.style.width = w; body.append(l); });
        c.append(body); deck.append(c); return deck;
      }

      function renderSaved() {
        if (!state.saved.length) { app.append(el("p", "empty", "No saved recipes yet. Swipe right to save.")); return; }
        const wrap = el("div");
        state.saved.forEach(r => {
          const item = el("div", "list-item");
          if (r.image) { const img = el("img"); img.src = r.image; img.alt = r.title; img.onclick = () => { state.detail = r; render(); }; item.append(img); }
          const info = el("div", "info"); info.onclick = () => { state.detail = r; render(); };
          info.append(el("span", "title-link", r.title));
          info.append(document.createElement("br"));
          info.append(el("small", "cook", "Tap for details · cook on " + r.publisher));
          item.append(info);
          const rm = el("button", "remove", "✕"); rm.onclick = () => removeSaved(r.id); item.append(rm);
          wrap.append(item);
        });
        app.append(wrap);
      }

      function renderSheet(recipe) {
        const back = el("div", "sheet-backdrop");
        back.onclick = () => { state.detail = null; render(); };
        const sheet = el("div", "sheet");
        sheet.onclick = (e) => e.stopPropagation();
        const head = el("div", "sheet-head");
        const close = el("button", "sheet-close", "←");
        close.setAttribute("aria-label", "Close");
        close.onclick = () => { state.detail = null; render(); };
        head.append(close, el("span", "htitle", recipe.title));
        sheet.append(head);
        if (recipe.image) { const img = el("img", "sheet-photo"); img.src = recipe.image; img.alt = recipe.title; sheet.append(img); }
        const body = el("div", "sheet-body");
        body.append(el("h2", null, recipe.title));
        const meta = el("div", "meta");
        [].concat(recipe.tags.cuisine, recipe.tags.mealType, recipe.tags.diet, recipe.tags.main).slice(0,6).forEach(t => meta.append(el("span","pill",t)));
        meta.append(el("span", "pill " + recipe.difficulty, recipe.difficulty));
        if (recipe.minutes) meta.append(el("span", "pill time", "⏱ " + recipe.minutes + " min"));
        body.append(meta);
        body.append(el("h3", null, "Ingredients"));
        const ul = el("ul", "ing-list");
        recipe.ingredients.forEach(i => ul.append(el("li", null, i.raw)));
        body.append(ul);
        if (recipe.stepCount) body.append(el("p", "source", recipe.stepCount + " steps — full method on source"));
        const cta = el("a", "cook-cta", "Cook on " + recipe.publisher + " →");
        cta.href = recipe.sourceUrl; cta.target = "_blank"; cta.rel = "noopener noreferrer";
        body.append(cta);
        if (state.tab === "discover") {
          const actions = el("div", "sheet-actions");
          const skip = el("button", "btn-nope", "✕ Skip"); skip.onclick = () => { state.detail = null; recordSwipe(recipe, "left"); };
          const save = el("button", "btn-like", "♥ Save"); save.onclick = () => { state.detail = null; recordSwipe(recipe, "right"); };
          actions.append(skip, save); body.append(actions);
        }
        sheet.append(body); back.append(sheet); app.append(back);
      }

      // ----- go -------------------------------------------------------------
      render();
      reload();
    </script>
  </body>
</html>
