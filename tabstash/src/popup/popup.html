<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>TabStash</title>
  </head>
  <body>
    <header class="bar">
      <div class="brand">
        <svg class="logo-svg" width="24" height="22" viewBox="0 0 24 22" fill="none" aria-hidden="true">
          <rect x="7" y="0" width="17" height="13" rx="3.5" fill="#818cf8" opacity="0.5"/>
          <rect x="0" y="7" width="17" height="13" rx="3.5" fill="#4f46e5"/>
        </svg>
        <h1>TabStash</h1>
      </div>
      <span id="plan" class="plan" hidden></span>
    </header>

    <section class="save">
      <input
        id="name"
        type="text"
        placeholder="Name this workspace…"
        maxlength="120"
        autocomplete="off"
      />
      <div class="save-actions">
        <button id="saveWindow" class="primary">Save this window</button>
        <button id="saveAll" class="ghost" title="Save every open window">All windows</button>
      </div>
    </section>

    <p id="message" class="message" hidden></p>

    <ul id="list" class="list" aria-live="polite"></ul>

    <section id="upsell" class="upsell" hidden>
      <p><strong>Free plan holds 3 workspaces.</strong></p>
      <p>Unlock unlimited workspaces plus file backup (export / import) with a one-time purchase.</p>
      <button id="buy" class="primary">Get unlimited for $3</button>
    </section>

    <footer class="foot">
      <button id="export" class="link" hidden>Export…</button>
      <button id="import" class="link" hidden>Import…</button>
      <input id="importFile" type="file" accept="application/json,.json" hidden />
    </footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
